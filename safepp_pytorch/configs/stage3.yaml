seed: 3407
output_dir: outputs/stage3
model:
  name: safepp_dual
  rgb_backbone: convnext_tiny.fb_in22k_ft_in1k
  forensic_backbone: resnet18
  wave: bior1.3
  mode: symmetric
  rgb_drop: 0.2
  forensic_drop: 0.1
  fusion_dim: 384
  pretrained_rgb: true
  pretrained_forensic: false
data:
  train_csv: /path/to/train_stage3.csv
  val_csv: /path/to/val.csv
  num_workers: 12
  pin_memory: true
  persistent_workers: true
  image_size: 256
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
  sampler:
    name: source_balanced
    group_by:
    - source
    - label
    alpha: 1.0
    replacement: true
    samples_per_epoch: null
    source_col: source
    weight_col: sample_weight
    hard_negative_col: is_hard_negative
    hard_negative_boost: 3.0
augment:
  train:
    hflip_p: 0.5
    color_jitter_p: 0.4
    color_jitter_strength: 0.3
    rotation_p: 0.3
    rotation_deg: 180
    random_mask_p: 0.25
    random_mask_patch: 16
    random_mask_ratio: 0.5
    gaussian_blur_p: 0.2
    gaussian_blur_sigma:
    - 0.1
    - 1.5
    jpeg_p: 0.2
    jpeg_quality:
    - 65
    - 100
  val:
    center_crop: true
train:
  epochs: 3
  batch_size_per_gpu: 24
  grad_accum_steps: 2
  amp: true
  ema_decay: 0.9997
  clip_grad_norm: 1.0
  label_smoothing: 0.0
  log_interval: 50
  save_every: 1
optim:
  name: adamw
  lr: 0.0001
  weight_decay: 0.02
  betas:
  - 0.9
  - 0.999
  warmup_epochs: 0
  min_lr: 1.0e-06
loss:
  pos_weight: 1.0
eval:
  batch_size_per_gpu: 64
  tta: 1
